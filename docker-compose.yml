services:
  app:
    build:
      context: .
      target: runtime
    container_name: novaai-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/ai-workspace
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novaai-network
    volumes:
      - app-logs:/usr/src/app/logs
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mongodb:
    image: mongo:7
    container_name: novaai-mongodb
    restart: unless-stopped
    command: ["mongod", "--wiredTigerCacheSizeGB", "1"]
    expose:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { quit(1) }" | mongosh --quiet || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - novaai-network
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: novaai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - novaai-network
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  mongo-express:
    image: mongo-express:1
    container_name: novaai-mongo-express
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: ${MONGO_EXPRESS_AUTH:-false}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - novaai-network
    profiles:
      - tools
    logging: *default-logging

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  novaai-network:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
  app-logs:
